<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .register-container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #10a37f;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            outline: none;
            background: #1e293b;
            color: white;
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-btn:hover {
            background: #0e8c6d;
        }

        .error {
            margin-top: 15px;
            color: #f87171;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }

        .footer a {
            color: #10a37f;
            text-decoration: none;
            font-weight: 500;
        }

        .password-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }

    </style>
</head>

<body>

    <div class="register-container">
        <h2>Create Account 🚀</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
                <div class="password-hint">
                    Use at least 8 characters
                </div>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Already have an account? <a href="/login/">Login</a>
        </div>
    </div>

</body>
</html>
