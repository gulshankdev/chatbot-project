<!DOCTYPE html>
<html>

<head>
    <title>AI Chatbot - {{ current_session.title }}</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #f8fafc;
            --sidebar-bg: #1e293b;
            --sidebar-text: #f1f5f9;
            --chat-bg: #ffffff;
            --bot-bubble: #f1f5f9;
            --user-bubble: #6366f1;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--primary-hover);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-item.active {
            background: rgba(255, 255, 255, 0.15);
            border-left: 3px solid var(--primary);
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            text-align: center;
        }

        .sidebar-footer a {
            color: #94a3b8;
            text-decoration: none;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
        }

        .chat-header {
            padding: 15px 30px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            font-weight: 600;
            color: #1e293b;
        }

        #chat-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: #1e293b;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button.send-btn {
            background: var(--primary);
            color: white;
            padding: 0 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .actions-row {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: background 0.2s;
        }

        .secondary-btn:hover {
            background: #e2e8f0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .sidebar-actions {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sidebar-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar-btn:hover {
            background: #2a2b32;
            color: white;
        }

        .sidebar-btn:active {
            transform: scale(0.98);
        }

    </style>
</head>

<body>

    <div class="sidebar">
        <h3 style="margin-top: 20px; margin-left: 25px; border-radius: 50%; font-size: 20px;">🤖</h3>
        <div class="sidebar-header">
            <a href="{% url 'new_chat' %}" style="text-decoration: none;">
                <button class="sidebar-btn"  onclick="window.location.href='{% url 'new_chat' %}'">
                    <span class="icon">📝</span>
                    <span>New Chat</span>
                </button>

            </a>
            <div class="sidebar-actions">
                    <button class="sidebar-btn">
                        🔍 Search chats
                    </button>

                    <button class="sidebar-btn">
                        📝 Summarize Chat
                    </button>
                </div>
        </div>

        <div style="margin-left: 12px; font-size: 14px; color: #64748b; padding: 10px 0;">Recents</div>
        <div class="chat-list">
            {% for session in sessions %}
            <a href="{% url 'chat_session' session.id %}"
                class="chat-item {% if session.id == current_session.id %}active{% endif %}"
                id="session-link-{{ session.id }}">
                {{ session.title }}
            </a>
            {% endfor %}
        </div>

        <div class="sidebar-footer">
            <a href="/logout/">Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <div class="chat-title" id="current-chat-title">{{ current_session.title }}</div>
            <div style="font-size: 13px; color: #94a3b8;">Mistral-7B Intelligence</div>
        </div>

        <div id="chat-box">
            {% for msg in history %}
            <div class="message {{ msg.role }}">
                {{ msg.content }}
            </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <div class="input-container">
                <div class="input-row">
                    <input type="text" id="message" placeholder="Message AI..."
                        onkeypress="if(event.keyCode==13) sendMessage()">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
                <div class="actions-row">
                    <button class="secondary-btn" onclick="getSentiment()">Analyze Sentiment</button>
                    <button class="secondary-btn" onclick="getSummary()">Summarize Chat</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sessionId = "{{ current_session.id }}";

        window.onload = function () {
            let chatBox = document.getElementById("chat-box");
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        function appendMessage(sender, text) {
            let chatBox = document.getElementById("chat-box");
            let msg = document.createElement("div");
            msg.classList.add("message");
            msg.classList.add(sender);
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            let input = document.getElementById("message");
            let message = input.value.trim();
            if (!message) return;

            appendMessage("user", message);
            input.value = "";

            fetch(`/chat/get-response/?message=${encodeURIComponent(message)}&session_id=${sessionId}`)
                .then(res => res.json())
                .then(data => {
                    appendMessage("bot", data.response);

                    // Update sidebar title if it changed
                    if (data.title) {
                        let titleElem = document.getElementById("current-chat-title");
                        titleElem.innerText = data.title;
                        let sessionLink = document.getElementById(`session-link-${sessionId}`);
                        if (sessionLink) sessionLink.innerText = data.title;
                        document.title = "AI Chatbot - " + data.title;
                    }
                });
        }

        function getSentiment() {
            let input = document.getElementById("message");
            let message = input.value.trim();
            if (!message) return;

            appendMessage("user", message);
            input.value = "";

            fetch(`/chat/sentiment/?message=${encodeURIComponent(message)}`)
                .then(res => res.json())
                .then(data => {
                    let sent = data.response;
                    appendMessage("bot", `Sentiment: ${sent.label} (Score: ${sent.score})`);
                });
        }

        function getSummary() {
            let input = document.getElementById("message");
            let message = input.value.trim();
            if (!message) return;

            appendMessage("user", message);
            input.value = "";

            fetch(`/chat/summary/?message=${encodeURIComponent(message)}`)
                .then(res => res.json())
                .then(data => {
                    let summary = typeof data.response === 'string' ? data.response : JSON.stringify(data.response);
                    appendMessage("bot", "Summary: " + summary);
                });
        }
    </script>

</body>

</html>
